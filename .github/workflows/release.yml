name: Release

# Cut a release by tagging main's top commit and pushing the tag:
#   git tag v1.2.0 && git push origin v1.2.0
# electron-builder builds the Windows installer and publishes it to the matching
# GitHub Release together with the .blockmap and latest.yml — the full set the
# in-app auto-updater needs. Building on a clean runner also avoids the flaky
# large-asset uploads we hit from a local machine.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build & publish (unsigned — no cert on the runner)
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
